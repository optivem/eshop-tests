name: 'Deploy Acceptance Environment'
description: 'Deploy both real and stub external system environments for acceptance testing'
inputs:
  version:
    description: 'Release version to deploy (e.g., latest, v1.0.4-rc)'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Checkout Base Repository
      run: |
        if [ -d "eshop/.git" ]; then
          echo "📂 Base repository already exists, pulling latest changes..."
          cd eshop
          git pull origin main
          cd ..
        else
          echo "📥 Cloning base repository..."
          git clone https://github.com/optivem/eshop.git eshop
        fi
        echo "✅ Base repository ready"
      shell: bash

    - name: Deploy System (Real External Systems)
      uses: optivem/actions/simulate-deployment@v1
      with:
        environment: acceptance
        version: ${{ inputs.version }}
        image-urls: '[]'
        compose-file: docker-compose.pipeline.real.yml
        systems: |
          [
            { "name": "Shop UI", "url": "http://localhost:3001/" },
            { "name": "Shop API", "url": "http://localhost:8081/health" },
            { "name": "ERP", "url": "http://localhost:9001/erp/health" },
            { "name": "Tax", "url": "http://localhost:9001/tax/health" }
          ]
        working-directory: eshop

    - name: Deploy System (Stub External Systems)
      uses: optivem/actions/simulate-deployment@v1
      with:
        environment: acceptance
        version: ${{ inputs.version }}
        image-urls: '[]'
        compose-file: docker-compose.pipeline.stub.yml
        systems: |
          [
            { "name": "Shop UI", "url": "http://localhost:3002/" },
            { "name": "Shop API", "url": "http://localhost:8082/health" },
            { "name": "ERP", "url": "http://localhost:9002/erp/health" },
            { "name": "Tax", "url": "http://localhost:9002/tax/health" }
          ]
        working-directory: eshop
