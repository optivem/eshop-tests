name: 'Setup TypeScript Tests'
description: 'Setup Node.js, install dependencies, build, and install Playwright for system tests'

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: optivem/actions/setup-node@v1
      with:
        node-version: 20
        working-directory: typescript

    - name: Compile System Tests
      run: npm run build
      working-directory: typescript
      shell: bash

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      working-directory: typescript/system-test
      shell: bash
