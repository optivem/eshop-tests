name: 'Setup TypeScript Tests'
description: 'Setup Node.js, install dependencies, build, and install Playwright for system tests'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: typescript/package-lock.json

    - name: Install Dependencies
      run: npm ci
      working-directory: typescript
      shell: bash

    - name: Build Project
      run: npm run build
      working-directory: typescript
      shell: bash

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      working-directory: typescript/system-test
      shell: bash
