name: 'Setup Java Tests'
description: 'Setup Java, Gradle, Playwright, and build project for system tests'

runs:
  using: 'composite'
  steps:
    - name: Setup Java Gradle
      uses: optivem/actions/setup-java-gradle@v1
      with:
        java-version: 21
        working-directory: java

    - name: Install Playwright Dependencies
      run: npx playwright install --with-deps chromium
      working-directory: java
      shell: bash

    - name: Compile System Tests
      run: ./gradlew clean compileJava compileTestJava
      working-directory: java
      shell: bash
