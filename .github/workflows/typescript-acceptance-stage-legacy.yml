name: typescript-acceptance-stage-legacy

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy Acceptance Environment
        uses: ./.github/actions/deploy-acceptance-environment

      - name: Setup TypeScript Tests
        uses: ./.github/actions/setup-typescript-tests

      # === mod02 ===
      - name: mod02 - Smoke
        run: npx playwright test --project=smoke-test tests/legacy/mod02/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      # === mod03 ===
      - name: mod03 - Smoke
        run: npx playwright test --project=smoke-test tests/legacy/mod03/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: mod03 - E2E
        run: npx playwright test --project=e2e-test tests/legacy/mod03/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance

      # === mod04 ===
      - name: mod04 - Smoke
        run: npx playwright test --project=smoke-test tests/legacy/mod04/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: mod04 - E2E
        run: npx playwright test --project=e2e-test tests/legacy/mod04/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance

      # === mod05 ===
      - name: mod05 - Smoke
        run: npx playwright test --project=smoke-test tests/legacy/mod05/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: mod05 - E2E
        run: npx playwright test --project=e2e-test tests/legacy/mod05/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      # === mod06 ===
      - name: mod06 - Smoke
        run: npx playwright test --project=smoke-test tests/legacy/mod06/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: mod06 - E2E - API Channel
        run: npx playwright test --project=e2e-test tests/legacy/mod06/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: API

      - name: mod06 - E2E - UI Channel
        run: npx playwright test --project=e2e-test tests/legacy/mod06/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: UI

      # === mod07 ===
      - name: mod07 - Smoke
        run: npx playwright test --project=smoke-test tests/legacy/mod07/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: mod07 - E2E - API Channel
        run: npx playwright test --project=e2e-test tests/legacy/mod07/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: API

      - name: mod07 - E2E - UI Channel
        run: npx playwright test --project=e2e-test tests/legacy/mod07/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: UI

      # === mod08 ===
      - name: mod08 - Smoke
        run: npx playwright test --project=smoke-test tests/legacy/mod08/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: mod08 - E2E - API Channel
        run: npx playwright test --project=e2e-test tests/legacy/mod08/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: API

      - name: mod08 - E2E - UI Channel
        run: npx playwright test --project=e2e-test tests/legacy/mod08/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: UI

      # === mod09 ===
      - name: mod09 - Smoke (Stub)
        run: npx playwright test --project=smoke-test tests/legacy/mod09/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB

      - name: mod09 - Smoke (Real)
        run: npx playwright test --project=smoke-test tests/legacy/mod09/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      # === mod10 ===
      - name: mod10 - Acceptance - API Channel
        run: npx playwright test --project=acceptance-test tests/legacy/mod10/acceptance --grep-invert "@isolated"
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: API

      - name: mod10 - Acceptance - UI Channel
        run: npx playwright test --project=acceptance-test tests/legacy/mod10/acceptance --grep-invert "@isolated"
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: UI

      - name: mod10 - Acceptance (Isolated) - API Channel
        run: npx playwright test --project=acceptance-test tests/legacy/mod10/acceptance --grep "@isolated" --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: API

      - name: mod10 - Acceptance (Isolated) - UI Channel
        run: npx playwright test --project=acceptance-test tests/legacy/mod10/acceptance --grep "@isolated" --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: UI

      # === mod11 ===
      - name: mod11 - Contract (Stub)
        run: npx playwright test --project=external-system-contract-test tests/legacy/mod11/contract --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB

      - name: mod11 - Contract (Real)
        run: npx playwright test --project=external-system-contract-test tests/legacy/mod11/contract --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: mod11 - E2E - API Channel
        run: npx playwright test --project=e2e-test tests/legacy/mod11/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod11 - E2E - UI Channel
        run: npx playwright test --project=e2e-test tests/legacy/mod11/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'Acceptance Stage'
        environment: acceptance
        stage-result: ${{ needs.run.result }}
