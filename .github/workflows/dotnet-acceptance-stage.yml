name: dotnet-acceptance-stage

on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes
  workflow_dispatch:

jobs:

  system-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy System (Real External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          external-system-mode: 'real'
          frontend-url: 'http://localhost:3001/'
          backend-url: 'http://localhost:8081/health'
          erp-url: 'http://localhost:9001/erp/health'
          tax-url: 'http://localhost:9001/tax/health'

      - name: Deploy System (Stub External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          external-system-mode: 'stub'
          frontend-url: 'http://localhost:3002/'
          backend-url: 'http://localhost:8082/health'
          erp-url: 'http://localhost:9002/erp/health'
          tax-url: 'http://localhost:9002/tax/health'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore system test dependencies
        run: dotnet restore
        working-directory: dotnet

      - name: Build system tests
        run: dotnet build --no-restore --configuration Release
        working-directory: dotnet

      - name: Install Playwright browsers
        run: |
          dotnet build
          pwsh bin/Debug/net8.0/playwright.ps1 install --with-deps
        working-directory: dotnet/SystemTests

      - name: Smoke (Stub)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Smoke (Real)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Acceptance - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Acceptance - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: Acceptance (Isolated) - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Acceptance (Isolated) - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: Contract (Stub)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Stub"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance

      - name: Contract (Real)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Real"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance

      - name: E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: E2E - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI
