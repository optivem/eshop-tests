name: dotnet-acceptance-stage

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy Acceptance Environment
        uses: ./.github/actions/deploy-acceptance-environment

      - name: Setup .NET Tests
        uses: ./.github/actions/setup-dotnet-tests

      - name: Smoke (Stub)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Smoke (Real)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Acceptance - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Acceptance - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: Acceptance (Isolated) - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Acceptance (Isolated) - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: Contract (Stub)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Stub"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance

      - name: Contract (Real)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Real"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance

      - name: E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: E2E - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Latest.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'Acceptance Stage'
        environment: acceptance
        stage-result: ${{ needs.run.result }}
