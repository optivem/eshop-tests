name: java-acceptance-stage-legacy

on:
  schedule:
    - cron: '0 0 * * *'  # Run once a day at midnight
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy Acceptance Environment
        uses: ./.github/actions/deploy-acceptance-environment

      - name: Setup Java Tests
        uses: ./.github/actions/setup-java-tests

      # === mod02: Smoke ===
      - name: mod02 - Smoke
        run: ./gradlew :system-test:test -Dversion=mod02 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: java

      # === mod03: E2E ===
      - name: mod03 - Smoke
        run: ./gradlew :system-test:test -Dversion=mod03 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: java

      - name: mod03 - E2E
        run: ./gradlew :system-test:test -Dversion=mod03 -Dtype=e2e -Denvironment=acceptance
        working-directory: java

      # === mod04: Clients ===
      - name: mod04 - Smoke
        run: ./gradlew :system-test:test -Dversion=mod04 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: java

      - name: mod04 - E2E
        run: ./gradlew :system-test:test -Dversion=mod04 -Dtype=e2e -Denvironment=acceptance
        working-directory: java

      # === mod05: Drivers ===
      - name: mod05 - Smoke
        run: ./gradlew :system-test:test -Dversion=mod05 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: java

      - name: mod05 - E2E
        run: ./gradlew :system-test:test -Dversion=mod05 -Dtype=e2e -Denvironment=acceptance
        working-directory: java

      # === mod06: Channels ===
      - name: mod06 - Smoke
        run: ./gradlew :system-test:test -Dversion=mod06 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: java

      - name: mod06 - E2E - API Channel
        run: ./gradlew :system-test:test -Dversion=mod06 -Dtype=e2e -Dchannel=API -Denvironment=acceptance
        working-directory: java

      - name: mod06 - E2E - UI Channel
        run: ./gradlew :system-test:test -Dversion=mod06 -Dtype=e2e -Dchannel=UI -Denvironment=acceptance
        working-directory: java

      # === mod07: App DSL ===
      - name: mod07 - Smoke (real)
        run: ./gradlew :system-test:test -Dversion=mod07 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: java

      - name: mod07 - E2E - API Channel
        run: ./gradlew :system-test:test -Dversion=mod07 -Dtype=e2e -Dchannel=API -Denvironment=acceptance
        working-directory: java

      - name: mod07 - E2E - UI Channel
        run: ./gradlew :system-test:test -Dversion=mod07 -Dtype=e2e -Dchannel=UI -Denvironment=acceptance
        working-directory: java

      # === mod08: Scenario DSL ===
      - name: mod08 - Smoke
        run: ./gradlew :system-test:test -Dversion=mod08 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: java

      - name: mod08 - E2E - API Channel
        run: ./gradlew :system-test:test -Dversion=mod08 -Dtype=e2e -Dchannel=API -Denvironment=acceptance
        working-directory: java

      - name: mod08 - E2E - UI Channel
        run: ./gradlew :system-test:test -Dversion=mod08 -Dtype=e2e -Dchannel=UI -Denvironment=acceptance
        working-directory: java

      # === mod09: External Stubs ===
      - name: mod09 - Smoke (Stub)
        run: ./gradlew :system-test:test -Dversion=mod09 -Dtype=smoke -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: java

      - name: mod09 - Smoke (Real)
        run: ./gradlew :system-test:test -Dversion=mod09 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: java

      # === mod10: Acceptance Tests ===
      - name: mod10 - Acceptance - API Channel
        run: ./gradlew :system-test:test -Dversion=mod10 -Dtype=acceptance -DexcludeTags=isolated -Dchannel=API -Denvironment=acceptance
        working-directory: java

      - name: mod10 - Acceptance - UI Channel
        run: ./gradlew :system-test:test -Dversion=mod10 -Dtype=acceptance -DexcludeTags=isolated -Dchannel=UI -Denvironment=acceptance
        working-directory: java

      - name: mod10 - Acceptance (Isolated) - API Channel
        run: ./gradlew :system-test:test -Dversion=mod10 -Dtype=acceptance -DincludeTags=isolated -Dchannel=API -Denvironment=acceptance
        working-directory: java

      - name: mod10 - Acceptance (Isolated) - UI Channel
        run: ./gradlew :system-test:test -Dversion=mod10 -Dtype=acceptance -DincludeTags=isolated -Dchannel=UI -Denvironment=acceptance
        working-directory: java

      # === mod11: Contract Tests ===
      - name: mod11 - Contract (Stub)
        run: ./gradlew :system-test:test -Dversion=mod11 -Dtype=contract -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: java

      - name: mod11 - Contract (Real)
        run: ./gradlew :system-test:test -Dversion=mod11 -Dtype=contract -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: java

      - name: mod11 - E2E - API Channel
        run: ./gradlew :system-test:test -Dversion=mod11 -Dtype=e2e -Dchannel=API -Denvironment=acceptance
        working-directory: java

      - name: mod11 - E2E - UI Channel
        run: ./gradlew :system-test:test -Dversion=mod11 -Dtype=e2e -Dchannel=UI -Denvironment=acceptance
        working-directory: java

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'Acceptance Stage'
        environment: acceptance
        stage-result: ${{ needs.run.result }}
