name: dotnet-acceptance-stage-legacy

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily
  workflow_dispatch:

jobs:

  system-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy Acceptance Environment
        uses: ./.github/actions/deploy-acceptance-environment

      - name: Setup .NET Tests
        uses: ./.github/actions/setup-dotnet-tests

      # === mod02: Smoke ===
      - name: mod02 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod02.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      # === mod03: Smoke + E2E ===
      - name: mod03 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod03.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod03 - E2E
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod03.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance

      # === mod04: Smoke + E2E ===
      - name: mod04 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod04.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod04 - E2E
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod04.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance

      # === mod05: Smoke + E2E ===
      - name: mod05 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod05.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod05 - E2E
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod05.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance

      # === mod06: Smoke + E2E ===
      - name: mod06 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod06.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod06 - E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod06.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod06 - E2E - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod06.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      # === mod07: Smoke + E2E ===
      - name: mod07 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod07.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod07 - E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod07.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod07 - E2E - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod07.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      # === mod08: Smoke + E2E ===
      - name: mod08 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod08.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod08 - E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod08.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod08 - E2E - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod08.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      # === mod09: Smoke (stub + real) ===
      - name: mod09 - Smoke (Stub)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod09.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: mod09 - Smoke (Real)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod09.SmokeTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      # === mod10: Acceptance ===
      - name: mod10 - Acceptance - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod10.AcceptanceTests&Category!=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: mod10 - Acceptance - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod10.AcceptanceTests&Category!=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: mod10 - Acceptance (Isolated) - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod10.AcceptanceTests&Category=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: mod10 - Acceptance (Isolated) - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod10.AcceptanceTests&Category=isolated"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      # === mod11: Contract + E2E ===
      - name: mod11 - Contract (Stub)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod11.ExternalSystemContractTests&FullyQualifiedName~Stub"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance

      - name: mod11 - Contract (Real)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod11.ExternalSystemContractTests&FullyQualifiedName~Real"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance

      - name: mod11 - E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod11.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod11 - E2E - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod11.E2eTests"
        working-directory: dotnet/SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI
