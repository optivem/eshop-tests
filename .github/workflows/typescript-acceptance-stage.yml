name: typescript-acceptance-stage

on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes
  workflow_dispatch:

jobs:

  system-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy System (Real External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          external-system-mode: 'real'
          frontend-url: 'http://localhost:3001/'
          backend-url: 'http://localhost:8081/health'
          erp-url: 'http://localhost:9001/erp/health'
          tax-url: 'http://localhost:9001/tax/health'

      - name: Deploy System (Stub External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          external-system-mode: 'stub'
          frontend-url: 'http://localhost:3002/'
          backend-url: 'http://localhost:8082/health'
          erp-url: 'http://localhost:9002/erp/health'
          tax-url: 'http://localhost:9002/tax/health'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: typescript/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: typescript

      - name: Build Project
        run: npm run build
        working-directory: typescript

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: typescript/system-test

      - name: Smoke (Stub)
        run: npx playwright test --project=smoke-test tests/latest/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB

      - name: Smoke (Real)
        run: npx playwright test --project=smoke-test tests/latest/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: Acceptance - API Channel
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep-invert "@isolated"
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: API

      - name: Acceptance - UI Channel
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep-invert "@isolated"
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: UI

      - name: Acceptance (Isolated) - API Channel
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep "@isolated" --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: API

      - name: Acceptance (Isolated) - UI Channel
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep "@isolated" --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: UI

      - name: Contract (Stub)
        run: npx playwright test --project=external-system-contract-test tests/latest/contract --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB

      - name: Contract (Real)
        run: npx playwright test --project=external-system-contract-test tests/latest/contract --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: E2E - API Channel
        run: npx playwright test --project=e2e-test tests/latest/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: E2E - UI Channel
        run: npx playwright test --project=e2e-test tests/latest/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI
