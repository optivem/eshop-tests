name: typescript-acceptance-stage

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy Acceptance Environment
        uses: ./.github/actions/deploy-acceptance-environment

      - name: Setup TypeScript Tests
        uses: ./.github/actions/setup-typescript-tests

      - name: Smoke (Stub)
        run: npx playwright test --project=smoke-test tests/latest/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB

      - name: Smoke (Real)
        run: npx playwright test --project=smoke-test tests/latest/smoke
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: Acceptance - API Channel
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep-invert "@isolated"
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: API

      - name: Acceptance - UI Channel
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep-invert "@isolated"
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: UI

      - name: Acceptance (Isolated) - API Channel
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep "@isolated" --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: API

      - name: Acceptance (Isolated) - UI Channel
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep "@isolated" --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: UI

      - name: Contract (Stub)
        run: npx playwright test --project=external-system-contract-test tests/latest/contract --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB

      - name: Contract (Real)
        run: npx playwright test --project=external-system-contract-test tests/latest/contract --workers=1
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: E2E - API Channel
        run: npx playwright test --project=e2e-test tests/latest/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: E2E - UI Channel
        run: npx playwright test --project=e2e-test tests/latest/e2e
        working-directory: typescript/system-test
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'Acceptance Stage'
        environment: acceptance
        stage-result: ${{ needs.run.result }}
        success-version: latest
