<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1940" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#1E8449"/>
    </marker>
    <marker id="arr-purple" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#8E44AD"/>
    </marker>
    <marker id="arr-back" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#AAAAAA"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1940" fill="#F7F8FA"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PAGE 1: AT CYCLE                                -->
  <!-- ═══════════════════════════════════════════════ -->

  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A1A2E">ATDD Process</text>
  <text x="450" y="72" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">AT Cycle (per scenario)</text>

  <!-- AT - RED - TEST -->
  <rect x="300" y="90" width="300" height="44" rx="7" fill="#E74C3C" stroke="#C0392B" stroke-width="1.5"/>
  <text x="450" y="117" text-anchor="middle" fill="white" font-weight="bold" font-size="14">AT - RED - TEST</text>

  <line x1="450" y1="134" x2="450" y2="170" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DECISION: DSL Interface Changed? -->
  <polygon points="450,170 590,215 450,260 310,215" fill="#FFF3E0" stroke="#E67E22" stroke-width="2"/>
  <text x="450" y="208" text-anchor="middle" fill="#D35400" font-weight="bold" font-size="11">DSL Interface</text>
  <text x="450" y="222" text-anchor="middle" fill="#D35400" font-weight="bold" font-size="11">Changed?</text>

  <!-- No → skip to GREEN (right side) -->
  <line x1="590" y1="215" x2="790" y2="215" stroke="#1E8449" stroke-width="2.5"/>
  <line x1="790" y1="215" x2="790" y2="870" stroke="#1E8449" stroke-width="2.5"/>
  <line x1="790" y1="870" x2="602" y2="870" stroke="#1E8449" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="610" y="207" fill="#1E8449" font-weight="bold" font-size="12">No</text>

  <!-- Yes ↓ -->
  <line x1="450" y1="260" x2="450" y2="300" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="462" y="286" fill="#D35400" font-weight="bold" font-size="12">Yes</text>

  <!-- AT - RED - DSL -->
  <rect x="300" y="300" width="300" height="44" rx="7" fill="#E67E22" stroke="#D35400" stroke-width="1.5"/>
  <text x="450" y="327" text-anchor="middle" fill="white" font-weight="bold" font-size="14">AT - RED - DSL</text>

  <line x1="450" y1="344" x2="450" y2="390" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DECISION: External System Driver Interface Changed? -->
  <polygon points="450,390 610,440 450,490 290,440" fill="#F5EEF8" stroke="#8E44AD" stroke-width="2"/>
  <text x="450" y="428" text-anchor="middle" fill="#6C3483" font-weight="bold" font-size="10">External System Driver</text>
  <text x="450" y="441" text-anchor="middle" fill="#6C3483" font-weight="bold" font-size="10">Interface Changed?</text>

  <!-- Yes → CT sub-process (right branch) -->
  <line x1="610" y1="440" x2="690" y2="440" stroke="#8E44AD" stroke-width="2.5" marker-end="url(#arr-purple)"/>
  <text x="625" y="432" fill="#8E44AD" font-weight="bold" font-size="12">Yes</text>

  <!-- CT Sub-Process box -->
  <rect x="690" y="412" width="180" height="56" rx="8" fill="#8E44AD" stroke="#6C3483" stroke-width="1.5"/>
  <text x="780" y="437" text-anchor="middle" fill="white" font-weight="bold" font-size="12">Contract Test</text>
  <text x="780" y="454" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">Sub-Process (p.2)</text>

  <!-- Return arrow from CT back to system driver decision -->
  <line x1="780" y1="468" x2="780" y2="580" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="780" y1="580" x2="612" y2="580" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-purple)"/>
  <text x="710" y="573" fill="#8E44AD" font-size="10" font-style="italic">return</text>

  <!-- No ↓ -->
  <line x1="450" y1="490" x2="450" y2="550" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="462" y="526" fill="#D35400" font-weight="bold" font-size="12">No</text>

  <!-- DECISION: System Driver Interface Changed? -->
  <polygon points="450,550 600,595 450,640 300,595" fill="#FFF3E0" stroke="#E67E22" stroke-width="2"/>
  <text x="450" y="588" text-anchor="middle" fill="#D35400" font-weight="bold" font-size="10">System Driver</text>
  <text x="450" y="601" text-anchor="middle" fill="#D35400" font-weight="bold" font-size="10">Interface Changed?</text>

  <!-- No → skip to GREEN (left side) -->
  <line x1="300" y1="595" x2="120" y2="595" stroke="#1E8449" stroke-width="2.5"/>
  <line x1="120" y1="595" x2="120" y2="870" stroke="#1E8449" stroke-width="2.5"/>
  <line x1="120" y1="870" x2="298" y2="870" stroke="#1E8449" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="270" y="587" fill="#1E8449" font-weight="bold" font-size="12">No</text>

  <!-- Yes ↓ -->
  <line x1="450" y1="640" x2="450" y2="690" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="462" y="672" fill="#D35400" font-weight="bold" font-size="12">Yes</text>

  <!-- AT - RED - SYSTEM DRIVER -->
  <rect x="275" y="690" width="350" height="44" rx="7" fill="#E67E22" stroke="#D35400" stroke-width="1.5"/>
  <text x="450" y="717" text-anchor="middle" fill="white" font-weight="bold" font-size="14">AT - RED - SYSTEM DRIVER</text>

  <line x1="450" y1="734" x2="450" y2="848" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AT - GREEN - SYSTEM -->
  <rect x="300" y="848" width="300" height="44" rx="7" fill="#27AE60" stroke="#1E8449" stroke-width="1.5"/>
  <text x="450" y="875" text-anchor="middle" fill="white" font-weight="bold" font-size="14">AT - GREEN - SYSTEM</text>

  <!-- Arrow to remaining scenarios decision -->
  <line x1="450" y1="892" x2="450" y2="930" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DECISION: Remaining scenarios? -->
  <polygon points="450,930 570,960 450,990 330,960" fill="#EBF5FB" stroke="#2874A6" stroke-width="2"/>
  <text x="450" y="957" text-anchor="middle" fill="#1A3A5C" font-weight="bold" font-size="11">Remaining</text>
  <text x="450" y="970" text-anchor="middle" fill="#1A3A5C" font-weight="bold" font-size="11">scenarios?</text>

  <!-- Yes → loop back -->
  <line x1="330" y1="960" x2="60" y2="960" stroke="#AAAAAA" stroke-width="2"/>
  <line x1="60" y1="960" x2="60" y2="112" stroke="#AAAAAA" stroke-width="2"/>
  <line x1="60" y1="112" x2="298" y2="112" stroke="#AAAAAA" stroke-width="2" marker-end="url(#arr-back)"/>
  <text x="300" y="952" fill="#AAAAAA" font-weight="bold" font-size="12">Yes</text>
  <text x="46" y="540" text-anchor="middle" fill="#BBBBBB" font-size="10" font-style="italic" transform="rotate(-90,46,540)">loop back to AT - RED - TEST</text>

  <!-- No → Done -->
  <line x1="570" y1="960" x2="660" y2="960" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="590" y="952" fill="#555" font-weight="bold" font-size="12">No</text>
  <rect x="660" y="942" width="180" height="36" rx="18" fill="#1A1A2E"/>
  <text x="750" y="965" text-anchor="middle" fill="white" font-weight="bold" font-size="13">All GREEN</text>

  <!-- ═══════════ PAGE 1 LEGEND ═══════════ -->
  <rect x="100" y="1020" width="700" height="60" rx="8" fill="white" stroke="#DDDDDD" stroke-width="1"/>
  <text x="450" y="1038" text-anchor="middle" fill="#999" font-size="11" font-weight="bold">LEGEND</text>

  <rect x="120" y="1052" width="14" height="14" rx="2" fill="#E74C3C"/>
  <text x="140" y="1063" fill="#444" font-size="11">RED - TEST</text>

  <rect x="240" y="1052" width="14" height="14" rx="2" fill="#E67E22"/>
  <text x="260" y="1063" fill="#444" font-size="11">RED - DSL / DRIVER</text>

  <rect x="420" y="1052" width="14" height="14" rx="2" fill="#27AE60"/>
  <text x="440" y="1063" fill="#444" font-size="11">GREEN</text>

  <rect x="520" y="1052" width="14" height="14" rx="2" fill="#8E44AD"/>
  <text x="540" y="1063" fill="#444" font-size="11">Contract Tests</text>

  <polygon points="660,1052 670,1059 660,1066 650,1059" fill="#FFF3E0" stroke="#E67E22" stroke-width="1.5"/>
  <text x="680" y="1063" fill="#444" font-size="11">Decision</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PAGE 2: CONTRACT TEST SUB-PROCESS               -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Separator -->
  <line x1="50" y1="1120" x2="850" y2="1120" stroke="#DDDDDD" stroke-width="1.5" stroke-dasharray="10,5"/>

  <text x="450" y="1165" text-anchor="middle" font-size="22" font-weight="bold" fill="#8E44AD">Contract Test Sub-Process</text>
  <text x="450" y="1192" text-anchor="middle" font-size="12" fill="#888" font-style="italic">Triggered when External System Driver Interface Changed = Yes</text>

  <!-- CT - RED - TEST -->
  <rect x="300" y="1215" width="300" height="44" rx="7" fill="#E74C3C" stroke="#C0392B" stroke-width="1.5"/>
  <text x="450" y="1242" text-anchor="middle" fill="white" font-weight="bold" font-size="14">CT - RED - TEST</text>

  <line x1="450" y1="1259" x2="450" y2="1295" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DECISION: DSL Interface Changed? -->
  <polygon points="450,1295 590,1340 450,1385 310,1340" fill="#FFF3E0" stroke="#E67E22" stroke-width="2"/>
  <text x="450" y="1333" text-anchor="middle" fill="#D35400" font-weight="bold" font-size="11">DSL Interface</text>
  <text x="450" y="1347" text-anchor="middle" fill="#D35400" font-weight="bold" font-size="11">Changed?</text>

  <!-- No → skip to CT GREEN STUB (right side) -->
  <line x1="590" y1="1340" x2="760" y2="1340" stroke="#1E8449" stroke-width="2.5"/>
  <line x1="760" y1="1340" x2="760" y2="1742" stroke="#1E8449" stroke-width="2.5"/>
  <line x1="760" y1="1742" x2="602" y2="1742" stroke="#1E8449" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="610" y="1332" fill="#1E8449" font-weight="bold" font-size="12">No</text>

  <!-- Yes ↓ -->
  <line x1="450" y1="1385" x2="450" y2="1425" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="462" y="1411" fill="#D35400" font-weight="bold" font-size="12">Yes</text>

  <!-- CT - RED - DSL -->
  <rect x="300" y="1425" width="300" height="44" rx="7" fill="#E67E22" stroke="#D35400" stroke-width="1.5"/>
  <text x="450" y="1452" text-anchor="middle" fill="white" font-weight="bold" font-size="14">CT - RED - DSL</text>

  <line x1="450" y1="1469" x2="450" y2="1510" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DECISION: External System Driver Interface Changed? -->
  <polygon points="450,1510 610,1560 450,1610 290,1560" fill="#F5EEF8" stroke="#8E44AD" stroke-width="2"/>
  <text x="450" y="1548" text-anchor="middle" fill="#6C3483" font-weight="bold" font-size="10">External System Driver</text>
  <text x="450" y="1561" text-anchor="middle" fill="#6C3483" font-weight="bold" font-size="10">Interface Changed?</text>

  <!-- No → skip to CT GREEN STUB (left side) -->
  <line x1="290" y1="1560" x2="140" y2="1560" stroke="#1E8449" stroke-width="2.5"/>
  <line x1="140" y1="1560" x2="140" y2="1742" stroke="#1E8449" stroke-width="2.5"/>
  <line x1="140" y1="1742" x2="298" y2="1742" stroke="#1E8449" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="260" y="1552" fill="#1E8449" font-weight="bold" font-size="12">No</text>

  <!-- Yes ↓ -->
  <line x1="450" y1="1610" x2="450" y2="1640" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="462" y="1632" fill="#D35400" font-weight="bold" font-size="12">Yes</text>

  <!-- CT - RED - EXTERNAL DRIVER -->
  <rect x="265" y="1640" width="370" height="44" rx="7" fill="#E67E22" stroke="#D35400" stroke-width="1.5"/>
  <text x="450" y="1667" text-anchor="middle" fill="white" font-weight="bold" font-size="14">CT - RED - EXTERNAL DRIVER</text>

  <line x1="450" y1="1684" x2="450" y2="1720" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CT - GREEN - STUB -->
  <rect x="300" y="1720" width="300" height="44" rx="7" fill="#27AE60" stroke="#1E8449" stroke-width="1.5"/>
  <text x="450" y="1747" text-anchor="middle" fill="white" font-weight="bold" font-size="14">CT - GREEN - STUB</text>

  <!-- Arrow to return -->
  <line x1="450" y1="1764" x2="450" y2="1800" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Return to AT Cycle -->
  <rect x="330" y="1800" width="240" height="36" rx="18" fill="#1A1A2E"/>
  <text x="450" y="1823" text-anchor="middle" fill="white" font-weight="bold" font-size="13">Return to AT Cycle</text>

  <!-- ═══════════ PAGE 2 LEGEND ═══════════ -->
  <rect x="100" y="1860" width="700" height="50" rx="8" fill="white" stroke="#DDDDDD" stroke-width="1"/>
  <text x="450" y="1892" text-anchor="middle" fill="#BBBBBB" font-size="10">Each RED phase follows: WRITE → Human Review → COMMIT. GREEN skip lines bypass intermediate phases.</text>
</svg>